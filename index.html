<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prep — Interview Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>

/* ── RESET ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ──────────────────────────────────────────────────── */
:root {
  --bg:         #0d0b09;
  --bg-1:       #141210;
  --bg-2:       #1c1916;
  --bg-input:   #100e0c;
  --bg-card:    #131110;

  --line:       #272320;
  --line-hi:    #3a3530;

  --gold:       #c4882a;
  --gold-dim:   #5c3e12;
  --gold-glow:  rgba(196,136,42,.1);
  --crimson:    #9b2335;

  --t1:         #ede8de;
  --t2:         #7a7060;
  --t3:         #3d3830;

  --green:      #2a8c5e;
  --red:        #b83030;
  --blue:       #2d6ab0;

  --serif: 'Cormorant Garamond', Georgia, serif;
  --mono:  'DM Mono', 'Fira Code', Consolas, monospace;
  --sans:  'DM Sans', -apple-system, sans-serif;

  --r:  3px;
  --r2: 6px;
}

/* ── BASE ────────────────────────────────────────────────────── */
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Ambient warm glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 65%, rgba(196,136,42,.04) 0%, transparent 100%),
    radial-gradient(ellipse 40% 55% at 85% 20%, rgba(155,35,53,.03) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 28px 100px;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 2px; }

/* ── HISTORY PANEL ───────────────────────────────────────────── */
.h-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
  z-index: 100;
}
.h-overlay.on { opacity: 1; pointer-events: all; }

.h-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--bg-1);
  border-left: 1px solid var(--line);
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.16,1,.3,1);
  z-index: 101;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.h-panel.on { transform: translateX(0); }

.h-panel-top {
  padding: 24px 22px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-shrink: 0;
}

.h-panel-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--t1);
  letter-spacing: -.2px;
}

.h-close {
  background: none;
  border: none;
  color: var(--t2);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 4px;
  transition: color .15s;
}
.h-close:hover { color: var(--t1); }

.h-list {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.h-empty {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t3);
  text-align: center;
  padding: 48px 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.h-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  padding: 15px 16px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.h-card:hover { border-color: var(--line-hi); background: var(--bg-card); }

.h-card-company {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--t1);
  line-height: 1.2;
  margin-bottom: 4px;
}

.h-card-role {
  font-size: 12px;
  color: var(--t2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 12px;
}

.h-card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.h-card-date {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--t3);
  letter-spacing: .8px;
  text-transform: uppercase;
}

.h-card-del {
  background: none;
  border: none;
  color: var(--t3);
  font-size: 12px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 3px;
  transition: color .15s, background .15s;
  line-height: 1;
}
.h-card-del:hover { color: var(--red); background: rgba(184,48,48,.1); }

/* ── HEADER ──────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 22px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 44px;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.logo-mark {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  font-style: italic;
  color: var(--gold);
  letter-spacing: -.3px;
}

.logo-rule {
  width: 1px;
  height: 14px;
  background: var(--line-hi);
  display: inline-block;
  vertical-align: middle;
}

.logo-sub {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--t3);
}

.header-nav { display: flex; gap: 6px; align-items: center; }

.nav-btn {
  background: none;
  border: 1px solid var(--line);
  color: var(--t2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: var(--r);
  cursor: pointer;
  transition: border-color .2s, color .2s;
  display: flex;
  align-items: center;
  gap: 7px;
}
.nav-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

.hist-badge {
  background: var(--gold);
  color: #000;
  font-size: 9px;
  font-weight: 600;
  border-radius: 10px;
  padding: 1px 6px;
  display: none;
}
.hist-badge.on { display: inline; }

/* ── SETTINGS ────────────────────────────────────────────────── */
.settings-panel {
  display: none;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  padding: 22px;
  margin-bottom: 32px;
}
.settings-panel.on { display: block; }

.settings-note {
  font-size: 11px;
  color: var(--t2);
  margin-top: 8px;
  line-height: 1.5;
}

/* ── EYEBROW ─────────────────────────────────────────────────── */
.eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--t3);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--gold);
}

/* ── FORMS ───────────────────────────────────────────────────── */
.form-section { margin-bottom: 52px; }
.form-grid { display: grid; gap: 18px; }
.form-group { display: flex; flex-direction: column; gap: 7px; }

.field-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--t2);
}
.field-label .opt { color: var(--t3); }

.field {
  background: var(--bg-input);
  border: 1px solid var(--line);
  border-radius: var(--r);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 13px;
  width: 100%;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.field:focus {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 3px var(--gold-glow);
}
.field::placeholder { color: var(--t3); }
textarea.field { resize: vertical; min-height: 110px; line-height: 1.65; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 11px 24px;
  border-radius: var(--r);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .8px;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  border: none;
}
.btn-primary { background: var(--gold); color: #000; }
.btn-primary:hover:not(:disabled) { background: #d4982e; }
.btn-primary:disabled { background: var(--gold-dim); color: #4a4030; cursor: not-allowed; }

.btn-ghost {
  background: none;
  border: 1px solid var(--line);
  color: var(--t2);
}
.btn-ghost:hover { border-color: var(--line-hi); color: var(--t1); }
.btn-sm { padding: 6px 12px; font-size: 9px; }

/* ── LOADER ──────────────────────────────────────────────────── */
.loader {
  display: none;
  align-items: center;
  gap: 12px;
  color: var(--t2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.loader.on { display: flex; }

.spin {
  width: 14px;
  height: 14px;
  border: 1px solid var(--line-hi);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── GUIDE ───────────────────────────────────────────────────── */
#guide-section { display: none; }
#guide-section.on { display: block; }

.guide-hd {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
}

.guide-hd-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.guide-company {
  font-family: var(--serif);
  font-size: 34px;
  font-weight: 500;
  color: var(--t1);
  letter-spacing: -.5px;
  line-height: 1.1;
}

.guide-meta {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--t3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 7px;
}

.guide-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  padding-top: 6px;
}

/* ── CARDS ───────────────────────────────────────────────────── */
.cards { display: flex; flex-direction: column; gap: 6px; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r2);
  overflow: hidden;
  transition: border-color .2s;
}
.card:hover { border-color: var(--line-hi); }

.card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
  gap: 16px;
}
.card-hd:hover { background: rgba(255,255,255,.015); }

.card-hd-left {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex: 1;
  min-width: 0;
}

.card-n {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--gold);
  opacity: .6;
  flex-shrink: 0;
  letter-spacing: .5px;
}

.card-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  color: var(--t1);
}

.card-chev {
  color: var(--t3);
  font-size: 10px;
  transition: transform .2s;
  flex-shrink: 0;
}
.card.open .card-chev { transform: rotate(180deg); }

.card-body {
  display: none;
  padding: 18px 20px 22px;
  border-top: 1px solid var(--line);
}
.card.open .card-body { display: block; }

/* ── MARKDOWN ────────────────────────────────────────────────── */
.md h1 {
  font-family: var(--serif);
  font-size: 22px; font-weight: 500;
  color: var(--t1); margin: 20px 0 10px;
}
.md h2 {
  font-family: var(--serif);
  font-size: 17px; font-weight: 500;
  color: var(--t1); margin: 18px 0 8px;
}
.md h3 {
  font-family: var(--mono);
  font-size: 9px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--gold); margin: 18px 0 8px;
}
.md p { margin: 8px 0; color: var(--t1); line-height: 1.8; }
.md ul, .md ol { padding-left: 22px; margin: 8px 0; }
.md li { margin: 5px 0; line-height: 1.75; }
.md strong { color: #fff; font-weight: 600; }
.md em { color: var(--t2); font-style: italic; }
.md a {
  color: var(--gold);
  text-decoration: none;
  border-bottom: 1px solid var(--gold-dim);
  transition: border-color .15s;
}
.md a:hover { border-color: var(--gold); }
.md code {
  font-family: var(--mono); font-size: 12px;
  background: var(--bg-2); padding: 1px 6px;
  border-radius: 3px; color: var(--green);
}
.md pre {
  background: var(--bg-2); border: 1px solid var(--line);
  border-radius: var(--r); padding: 14px 16px;
  overflow-x: auto; margin: 12px 0;
}
.md pre code { background: none; padding: 0; }
.md blockquote {
  border-left: 2px solid var(--gold-dim);
  padding-left: 16px; color: var(--t2); margin: 12px 0;
  font-family: var(--serif); font-size: 15px; font-style: italic;
}
.md hr { border: none; border-top: 1px solid var(--line); margin: 16px 0; }

/* ── STREAM CURSOR ───────────────────────────────────────────── */
.streaming::after {
  content: '▋';
  color: var(--gold);
  animation: blink .8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── CHAT ────────────────────────────────────────────────────── */
#chat-section { display: none; margin-top: 52px; }
#chat-section.on { display: block; }

.chat-wrap {
  border: 1px solid var(--line);
  border-radius: var(--r2);
  overflow: hidden;
  background: var(--bg-card);
}

.chat-top {
  padding: 13px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--t2);
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

.chat-btns { display: flex; gap: 8px; }

.chat-msgs {
  height: 420px;
  overflow-y: auto;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.msg { display: flex; gap: 14px; }

.msg-av {
  width: 28px; height: 28px;
  border-radius: var(--r);
  font-family: var(--mono);
  font-size: 8px; font-weight: 500;
  letter-spacing: .5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; text-transform: uppercase;
}
.msg.user .msg-av { background: rgba(196,136,42,.12); color: var(--gold); }
.msg.ai   .msg-av { background: rgba(45,106,176,.12); color: var(--blue); }

.msg-body { flex: 1; min-width: 0; }

.msg-role {
  font-family: var(--mono);
  font-size: 8px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--t3); margin-bottom: 5px;
}

.msg-text { color: var(--t1); line-height: 1.8; word-break: break-word; }
.msg-text strong { color: #fff; font-weight: 600; }
.msg-text em { color: var(--t2); }
.msg-text a { color: var(--gold); }
.msg-text code {
  font-family: var(--mono); font-size: 12px;
  background: var(--bg-2); padding: 1px 6px;
  border-radius: 3px; color: var(--green);
}
.msg-text ul, .msg-text ol { padding-left: 20px; margin: 6px 0; }
.msg-text li { margin: 4px 0; }
.msg-text p { margin: 5px 0; }
.msg-text blockquote {
  border-left: 2px solid var(--gold-dim);
  padding-left: 12px; color: var(--t2); margin: 8px 0;
}

.chat-foot { border-top: 1px solid var(--line); padding: 16px; }
.chat-row { display: flex; gap: 10px; align-items: flex-end; }

.chat-input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--line);
  border-radius: var(--r);
  color: var(--t1);
  font-family: var(--sans); font-size: 14px;
  padding: 11px 13px; resize: none; outline: none;
  min-height: 44px; max-height: 160px;
  line-height: 1.55; transition: border-color .2s;
}
.chat-input:focus { border-color: var(--gold-dim); }
.chat-input::placeholder { color: var(--t3); }

.chat-send {
  width: 44px; height: 44px;
  background: var(--gold); border: none;
  border-radius: var(--r); color: #000;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s; flex-shrink: 0;
}
.chat-send:hover:not(:disabled) { background: #d4982e; }
.chat-send:disabled { background: var(--gold-dim); cursor: not-allowed; }

.chat-hints { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }

.pill {
  background: none;
  border: 1px solid var(--line);
  border-radius: 20px;
  color: var(--t2);
  font-family: var(--mono); font-size: 10px;
  padding: 4px 12px; cursor: pointer;
  transition: border-color .2s, color .2s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── MISC ────────────────────────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--line); margin: 40px 0; display: none; }
.divider.on { display: block; }

.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: #140a0a;
  border: 1px solid rgba(184,48,48,.25);
  border-left: 3px solid var(--red);
  border-radius: var(--r);
  padding: 13px 18px;
  font-size: 13px; color: #e89090;
  max-width: 380px; z-index: 999;
  display: none; line-height: 1.55;
}
.toast.on { display: block; animation: toastIn .2s ease; }
@keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

.retry-btn {
  display: inline-block; margin-top: 10px;
  background: none;
  border: 1px solid var(--line-hi);
  border-radius: var(--r); color: var(--gold);
  font-family: var(--mono); font-size: 10px;
  padding: 5px 12px; cursor: pointer;
  transition: border-color .2s;
}
.retry-btn:hover { border-color: var(--gold); }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 640px) {
  .app { padding: 0 16px 80px; }
  .form-row { grid-template-columns: 1fr; }
  .chat-msgs { height: 300px; }
  .h-panel { width: 100%; }
  .guide-company { font-size: 26px; }
  .guide-hd-top { flex-direction: column; }
  .logo-sub { display: none; }
}

</style>
</head>
<body><!-- JS and HTML added in subsequent stages --></body>
</html>
